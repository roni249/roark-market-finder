name: Monthly Market Finder

on:
  schedule:
    - cron: "0 10 5 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-market-finder
  cancel-in-progress: false

jobs:
  monthly-market-finder:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          REALTOR_COUNTY_CSV_URL: https://econdata.s3-us-west-2.amazonaws.com/Reports/Core/RDC_Inventory_Core_Metrics_County_History.csv
          REALTOR_ZIP_CSV_URL: https://econdata.s3-us-west-2.amazonaws.com/Reports/Core/RDC_Inventory_Core_Metrics_Zip_History.csv
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TARGET_STATES: FL,MI,GA,AL
          EMAIL_PROVIDER: smtp
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          COLD_CALLER_A_EMAIL: ${{ secrets.COLD_CALLER_A_EMAIL }}
          COLD_CALLER_B_EMAIL: ${{ secrets.COLD_CALLER_B_EMAIL }}
          COLD_CALLER_A_NAME: ${{ secrets.COLD_CALLER_A_NAME }}
          COLD_CALLER_B_NAME: ${{ secrets.COLD_CALLER_B_NAME }}
          ZIP_COOLDOWN_MONTHS: 18
          ALLOW_COOLDOWN_OVERRIDE: "false"
          TOP_COUNTIES_PER_STATE: 5
          TOP_ZIPS_PER_COUNTY: 10
          MIN_ACTIVE_LISTING_COUNT: 10
          MIN_PENDING_LISTING_COUNT: 3
          MAJOR_CITY_FILTER_ENABLED: "true"
          MAJOR_CITY_DRIVE_MINUTES: 45
          TARGET_ZIPS_PER_STATE: 200
          DENSE_RESIDENTIAL_FILTER_ENABLED: "true"
          DENSE_RESIDENTIAL_MIN_LEAD_VOLUME: 25
        run: python app/jobs/monthly_run.py

      - name: Commit monthly outputs and ZIP history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history/zip_usage_history.csv data/processed/
          if git diff --cached --quiet; then
            echo "No monthly output changes to commit."
          else
            git commit -m "Add monthly market finder outputs"
            git push
          fi
